<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="potGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E28743" />
      <stop offset="100%" stop-color="#873E23" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E7D32" />
      <stop offset="100%" stop-color="#4CAF50" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E7D32" />
      <stop offset="100%" stop-color="#4CAF50" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background Circle (Subtle Glassmorphism effect overlay) -->
  <circle cx="250" cy="220" r="150" fill="none" stroke="url(#leafGrad)" stroke-width="3" stroke-dasharray="10 5" opacity="0.4" />

  <!-- Traditional Cooking Clay Pot (Veedu cooking theme) -->
  <g filter="url(#shadow)">
    <!-- Pot Neck and Rim -->
    <path d="M 210,180 L 290,180 C 290,180 300,165 290,155 L 210,155 C 200,165 210,180 210,180 Z" fill="url(#potGrad)" />
    <!-- Pot Body -->
    <path d="M 210,180 C 190,180 160,200 160,240 C 160,290 200,320 250,320 C 300,320 340,290 340,240 C 340,200 310,180 290,180 Z" fill="url(#potGrad)" />
    <!-- Clay Pot Lid -->
    <path d="M 220,150 C 220,150 225,135 250,135 C 275,135 280,150 280,150 Z" fill="#D36B27" />
    <circle cx="250" cy="130" r="8" fill="#873E23" />
  </g>

  <!-- Spice / Food Grains (Dotted arcs representing health mixes / masalas popping out) -->
  <circle cx="230" cy="220" r="5" fill="#FFF" opacity="0.8" />
  <circle cx="250" cy="240" r="4" fill="#FFF" opacity="0.6" />
  <circle cx="270" cy="215" r="5" fill="#FFF" opacity="0.7" />
  <circle cx="250" cy="195" r="3" fill="#FFF" opacity="0.9" />

  <!-- Organic Green Leaves wrapping around the pot -->
  <path d="M 140,280 C 120,240 140,190 170,180 C 165,210 180,240 190,250 C 170,260 150,270 140,280 Z" fill="url(#leafGrad)" />
  <path d="M 360,280 C 380,240 360,190 330,180 C 335,210 320,240 310,250 C 330,260 350,270 360,280 Z" fill="url(#leafGrad)" />

  <!-- Traditional Home reference (Small roof overlay on pot) -->
  <path d="M 225,170 L 250,148 L 275,170" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

  <!-- Text: Made In Veedu -->
  <text x="250" y="410" font-family="'Outfit', 'Inter', sans-serif" font-size="34" font-weight="800" text-anchor="middle" letter-spacing="1.5" fill="#2E7D32">
    MADE IN VEEDU
  </text>
  
  <text x="250" y="440" font-family="'Inter', sans-serif" font-size="14" font-weight="600" text-anchor="middle" letter-spacing="4" fill="#666" opacity="0.8">
    TRADITIONAL &amp; ORGANIC
  </text>
</svg>
